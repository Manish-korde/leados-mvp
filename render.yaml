services:
  # React Frontend - Static Site (FREE forever)
  - type: web
    name: leados-mvp
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "22.15.0"
      - key: VITE_API_BASE
        value: https://leados-n8n.onrender.com
